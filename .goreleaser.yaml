version: 2

project_name: fifawc26

before:
  hooks:
    - go mod tidy

builds:
  - id: fifawc26
    main: ./cmd/fifawc26
    binary: fifawc26
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/charliehustlr1792/fifawc26/internal/cli.Version={{.Version}}
      - -X github.com/charliehustlr1792/fifawc26/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/charliehustlr1792/fifawc26/internal/cli.BuildDate={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

homebrew_casks:
  - name: fifawc26
    repository:
      owner: charliehustlr1792
      name: homebrew-tap
    homepage: "https://github.com/charliehustlr1792/fifawc26"
    description: "FIFA World Cup 2026 in your terminal"
    license: "MIT"

scoops:
  - name: fifawc26
    repository:
      owner: charliehustlr1792
      name: scoop-bucket
    homepage: "https://github.com/charliehustlr1792/fifawc26"
    description: "FIFA World Cup 2026 in your terminal"
    license: "MIT"